<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kruskal's vs Prim's Algorithm</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1,h2{
    text-align:center;
}

button{
    display:block;
    margin:20px auto;
    padding:10px 25px;
    font-size:16px;
    cursor:pointer;
    border:none;
    border-radius:5px;
    background:#007BFF;
    color:white;
}

button:hover{
    background:#0056b3;
}

pre{
    background:#222;
    color:#00ff00;
    padding:15px;
    overflow:auto;
}
</style>

</head>

<body>

<div class="container">

<h1>Minimum Spanning Tree Algorithms</h1>

<p><b>Graph:</b> 7 Vertices (0-6)</p>

<button onclick="runAlgorithms()">Run Algorithms</button>

<h2>Output</h2>

<pre id="output"></pre>

</div>

<script>

class UnionFind{

constructor(n){

this.parent=[];

this.rank=[];

for(let i=0;i<n;i++){

this.parent.push(i);

this.rank.push(0);

}

}

find(x){

if(this.parent[x]!==x)
this.parent[x]=this.find(this.parent[x]);

return this.parent[x];

}

union(x,y){

let rx=this.find(x);

let ry=this.find(y);

if(rx===ry) return false;

if(this.rank[rx]<this.rank[ry]){

let temp=rx;
rx=ry;
ry=temp;

}

this.parent[ry]=rx;

if(this.rank[rx]===this.rank[ry])
this.rank[rx]++;

return true;

}

}

function kruskal(n,edges){

edges.sort((a,b)=>a[0]-b[0]);

let uf=new UnionFind(n);

let mst=[];

let cost=0;

for(let e of edges){

let w=e[0];

let u=e[1];

let v=e[2];

if(uf.union(u,v)){

mst.push([u,v,w]);

cost+=w;

if(mst.length===n-1)
break;

}

}

return {mst,cost};

}

function prim(n,adj,start=0){

let key=new Array(n).fill(Infinity);

let parent=new Array(n).fill(-1);

let inMST=new Array(n).fill(false);

key[start]=0;

let mst=[];

let cost=0;

while(true){

let u=-1;

let min=Infinity;

for(let i=0;i<n;i++){

if(!inMST[i] && key[i]<min){

min=key[i];

u=i;

}

}

if(u===-1)
break;

inMST[u]=true;

if(parent[u]!=-1){

mst.push([parent[u],u,key[u]]);

cost+=key[u];

}

for(let edge of adj[u]){

let v=edge[0];

let wt=edge[1];

if(!inMST[v] && wt<key[v]){

key[v]=wt;

parent[v]=u;

}

}

}

return {mst,cost};

}

function runAlgorithms(){

const n=7;

const edges=[

[7,0,1],
[5,0,3],
[8,1,2],
[9,1,3],
[7,1,4],
[5,2,4],
[15,3,4],
[6,3,5],
[8,4,5],
[9,4,6],
[11,5,6]

];

let adj=[];

for(let i=0;i<n;i++)
adj.push([]);

for(let e of edges){

let w=e[0];

let u=e[1];

let v=e[2];

adj[u].push([v,w]);

adj[v].push([u,w]);

}

let k=kruskal(n,[...edges]);

let p=prim(n,adj);

let output="=== KRUSKAL'S MST ===\n\n";

for(let e of k.mst){

output+=`Edge (${e[0]} - ${e[1]})   Weight = ${e[2]}\n`;

}

output+=`\nTotal MST Cost = ${k.cost}\n`;

output+="\n=============================\n\n";

output+="=== PRIM'S MST ===\n\n";

for(let e of p.mst){

output+=`Edge (${e[0]} - ${e[1]})   Weight = ${e[2]}\n`;

}

output+=`\nTotal MST Cost = ${p.cost}`;

document.getElementById("output").textContent=output;

}

</script>

</body>
</html>
